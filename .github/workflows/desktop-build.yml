name: Build Desktop Apps

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.2)'
        required: true
        default: 'v0.1.2'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS Apple Silicon (arm64) ──────────────────────────
  build-mac-arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Next build
        run: npx next build

      - name: Prepare standalone
        run: node electron/prepare-standalone.cjs

      - name: electron-builder (arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: npx electron-builder --mac --arm64 --publish always

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-arm64
          path: dist-desktop/
          if-no-files-found: error

  # ── macOS Intel (x64) ────────────────────────────────────
  build-mac-x64:
    name: macOS x64 (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Next build
        run: npx next build

      - name: Prepare standalone
        run: node electron/prepare-standalone.cjs

      - name: electron-builder (x64 cross-compile)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: npx electron-builder --mac --x64 --publish always

      - uses: actions/upload-artifact@v4
        with:
          name: dist-mac-x64
          path: dist-desktop/
          if-no-files-found: error

  # ── Windows x64 ──────────────────────────────────────────
  build-win:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Next build
        run: npx next build

      - name: Prepare standalone
        run: node electron/prepare-standalone.cjs

      - name: electron-builder (win x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: npx electron-builder --win --x64 --publish always

      - uses: actions/upload-artifact@v4
        with:
          name: dist-win-x64
          path: dist-desktop/
          if-no-files-found: error
