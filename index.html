<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Platform - 本地预览入口</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-size: 32px;
            font-weight: 900;
            color: #1a202c;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 16px;
            color: #718096;
            margin-bottom: 32px;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f7fafc;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 24px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: #48bb78;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .btn {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .links {
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #e2e8f0;
        }
        .links h3 {
            font-size: 14px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-item {
            display: block;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 8px;
            color: #2d3748;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .link-item:hover {
            background: #edf2f7;
        }
        .note {
            margin-top: 24px;
            padding: 16px;
            background: #fff5f5;
            border-left: 4px solid #fc8181;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            color: #742a2a;
            line-height: 1.6;
        }
        .note strong {
            display: block;
            margin-bottom: 8px;
            color: #c53030;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AI Platform</h1>
        <p class="subtitle">学校终端 · 任务 & 目标一体化原型场</p>
        
        <div class="status">
            <span class="status-dot"></span>
            <span>本地开发服务</span>
        </div>

        <a href="http://127.0.0.1:3000" class="btn" target="_blank">打开项目预览</a>

        <div class="links">
            <h3>快速入口</h3>
            <div class="link-list">
                <a href="http://127.0.0.1:3000" class="link-item" target="_blank">
                    🏠 首页入口大厅
                </a>
                <a href="http://127.0.0.1:3000/admin" class="link-item" target="_blank">
                    ⚙️ 后台管理系统（目标/任务/勋章配置）
                </a>
                <a href="http://127.0.0.1:3000/terminal/welcome?type=new" class="link-item" target="_blank">
                    👤 终端前端原型（新用户）
                </a>
                <a href="http://127.0.0.1:3000/terminal/welcome?type=returning" class="link-item" target="_blank">
                    🔄 终端前端原型（老用户）
                </a>
                <a href="http://127.0.0.1:3000/terminal/welcome?type=no-growth" class="link-item" target="_blank">
                    📱 终端前端原型（无成长系统）
                </a>
            </div>
        </div>

        <div class="note">
            <strong>⚠️ 使用说明</strong>
            1. 确保已在终端运行 <code>npm run dev</code> 启动开发服务<br>
            2. 默认端口为 3000，如果修改了端口请手动访问对应地址<br>
            3. 如果无法打开，请检查开发服务是否正常运行
        </div>
    </div>

    <script>
        // 检测开发服务是否运行
        fetch('http://127.0.0.1:3000')
            .then(() => {
                console.log('✅ 开发服务运行正常');
            })
            .catch(() => {
                console.warn('⚠️ 开发服务未运行，请先执行 npm run dev');
                const statusDot = document.querySelector('.status-dot');
                const statusText = document.querySelector('.status span:last-child');
                if (statusDot && statusText) {
                    statusDot.style.background = '#f56565';
                    statusText.textContent = '开发服务未运行';
                }
            });
    </script>
</body>
</html>
