name: Build Desktop Apps (macOS + Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    name: Build (macOS universal)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish desktop packages (macOS arm64 + x64)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run desktop:build -- --mac --x64 --arm64 --publish always

      - name: Upload artifacts (dist-desktop)
        uses: actions/upload-artifact@v4
        with:
          name: dist-desktop-macOS
          path: dist-desktop/**
          if-no-files-found: error

  build-win:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish desktop packages (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run desktop:build -- --publish always

      - name: Upload artifacts (dist-desktop)
        uses: actions/upload-artifact@v4
        with:
          name: dist-desktop-Windows
          path: dist-desktop/**
          if-no-files-found: error
