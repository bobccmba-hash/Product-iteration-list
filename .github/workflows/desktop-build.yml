name: Build Desktop Apps (macOS + Windows)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon (arm64)
            os: macos-latest
            arch: arm64
          - name: macOS Intel (x64)
            os: macos-13
            arch: x64
          - name: Windows (x64)
            os: windows-latest
            arch: x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & publish desktop packages (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run desktop:build -- --mac --${{ matrix.arch }} --publish always

      - name: Build & publish desktop packages (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run desktop:build -- --publish always

      - name: Upload artifacts (dist-desktop)
        uses: actions/upload-artifact@v4
        with:
          name: dist-desktop-${{ matrix.name }}
          path: dist-desktop/**
          if-no-files-found: error
